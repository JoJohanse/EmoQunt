<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .card {
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
            border: 1px solid rgba(0, 0, 0, 0.125);
        }
        .form-control:focus, .form-select:focus {
            border-color: #86b7fe;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">📊 量化策略回测系统</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="fas fa-home"></i> 首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/backtest"><i class="fas fa-chart-line"></i> 策略回测</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/strategies"><i class="fas fa-list"></i> 策略列表</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h3 class="mb-0">⚙️ 策略回测配置</h3>
                    </div>
                    <div class="card-body">
                        <form action="/run_backtest" method="post">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="strategy_name" class="form-label">📈 选择策略</label>
                                    <select class="form-select" id="strategy_name" name="strategy_name" required>
                                        <option value="">请选择策略...</option>
                                        {% for strategy in strategies %}
                                        <option value="{{ strategy }}">{{ strategy }}</option>
                                        {% endfor %}
                                    </select>
                                    <div class="form-text">选择要回测的策略</div>
                                </div>
                                
                                <div class="col-md-6 mb-3">
                                    <label for="stock_code" class="form-label">🎫 股票代码</label>
                                    <input type="text" class="form-control" id="stock_code" name="stock_code" value="000001" placeholder="输入股票代码" required>
                                    <div class="form-text">例如: 000001 (平安银行)</div>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="initial_capital" class="form-label">💰 初始资金</label>
                                    <input type="number" class="form-control" id="initial_capital" name="initial_capital" value="100000.0" step="any" min="1000" required>
                                    <div class="form-text">最小1000元</div>
                                </div>
                                
                                <div class="col-md-6 mb-3">
                                    <label for="commission_rate" class="form-label">💸 佣金费率</label>
                                    <input type="number" class="form-control" id="commission_rate" name="commission_rate" value="0.001" step="0.0001" min="0" max="0.01" required>
                                    <div class="form-text">默认0.1%</div>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="start_date" class="form-label">📅 开始日期</label>
                                    <input type="date" class="form-control" id="start_date" name="start_date" value="2023-01-01" required>
                                </div>
                                
                                <div class="col-md-6 mb-3">
                                    <label for="end_date" class="form-label">🔚 结束日期</label>
                                    <input type="date" class="form-control" id="end_date" name="end_date" value="2023-12-31" required>
                                </div>
                            </div>
                            
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a href="/" class="btn btn-secondary me-md-2">返回首页</a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-play"></i> 运行回测
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
                
                <div class="card mt-4">
                    <div class="card-header">
                        <h5 class="mb-0">ℹ️ 使用说明</h5>
                    </div>
                    <div class="card-body">
                        <ol>
                            <li>选择要测试的策略</li>
                            <li>输入要回测的股票代码</li>
                            <li>设置初始资金和佣金费率</li>
                            <li>选择回测时间段</li>
                            <li>点击"运行回测"按钮开始</li>
                        </ol>
                        <p class="text-muted">注意：回测结果仅供参考，不构成投资建议。</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-light py-4 mt-5">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <h5>📊 量化策略回测系统</h5>
                    <p class="text-muted">专业量化分析平台</p>
                </div>
                <div class="col-md-6 text-md-end">
                    <p class="mb-0">&copy; 2026 Qdt_test 量化策略回测系统</p>
                    <p class="mb-0 text-muted">让量化投资更简单</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</body>
</html>
