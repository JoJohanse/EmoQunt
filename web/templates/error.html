<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .card {
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
            border: 1px solid rgba(0, 0, 0, 0.125);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">📊 量化策略回测系统</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/backtest"><i class="fas fa-chart-line"></i> 策略回测</a>
                <a class="nav-link" href="/strategies"><i class="fas fa-list"></i> 策略列表</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-danger text-white">
                        <h4 class="mb-0"><i class="fas fa-exclamation-triangle"></i> 发生错误!</h4>
                    </div>
                    <div class="card-body">
                        <p class="card-text text-danger"><strong>错误信息:</strong></p>
                        <pre class="bg-light p-3 border">{{ error }}</pre>
                        <div class="mt-3">
                            <a class="btn btn-primary" href="/backtest">
                                <i class="fas fa-arrow-left"></i> 返回回测页面
                            </a>
                            <a class="btn btn-secondary" href="/">
                                <i class="fas fa-home"></i> 返回首页
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-light py-4 mt-5">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <h5>📊 量化策略回测系统</h5>
                    <p class="text-muted">专业量化分析平台</p>
                </div>
                <div class="col-md-6 text-md-end">
                    <p class="mb-0">&copy; 2026 Qdt_test 量化策略回测系统</p>
                    <p class="mb-0 text-muted">让量化投资更简单</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</body>
</html>
