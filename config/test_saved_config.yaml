api:
  akshare:
    retry_times: 3
    timeout: 30
  zhi_tu:
    retry_times: 3
    timeout: 30
    token_env_var: ZHI_TU_API_TOKEN
backtest:
  commission_rate: 0.001
  initial_capital: 100000.0
  slippage_enabled: false
  slippage_rate: 0.0005
data:
  cache_duration_days: 7
  cache_enabled: true
  default_adjust: hfq
  default_data_type: daily
  default_market: zh_a
  storage_path: ./stock_data
environment:
  debug: false
  random_seed: 42
factor:
  ic_confidence_level: 0.95
  normalization_method: standard
  quantile_number: 5
  winsorize_limits:
    lower: 0.025
    upper: 0.025
logging:
  backup_count: 30
  level: INFO
  log_dir: ./logs
risk_management:
  max_daily_loss: 0.05
  max_drawdown: 0.15
  max_leverage: 1.0
  max_position_size: 0.1
  max_sector_exposure: 0.3
strategy:
  default_long_period: 20
  default_short_period: 5
  max_portfolio_percent: 0.8
  max_single_buy_percent: 0.2
  max_single_sell_percent: 0.3
  min_order_size: 100
test:
  bool_value: true
  helper_value: helper_test
  new_value: test_string
  number_value: 42
