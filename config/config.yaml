# Qdt_test 项目配置文件

# 数据配置
data:
  # 数据存储路径
  storage_path: "./stock_data"
  # 默认市场类型
  default_market: "zh_a"
  # 默认复权类型
  default_adjust: "hfq"
  # 默认数据类型
  default_data_type: "daily"
  # 数据缓存设置
  cache_enabled: true
  cache_duration_days: 7

# 策略配置
strategy:
  # 默认最小交易单位
  min_order_size: 100
  # 最大持仓比例
  max_portfolio_percent: 0.8
  # 单笔交易百分比（买）
  max_single_buy_percent: 0.2
  # 单笔交易百分比（卖）
  max_single_sell_percent: 0.3
  # 默认短期均线周期
  default_short_period: 5
  # 默认长期均线周期
  default_long_period: 20

# 回测配置
backtest:
  # 默认初始资金
  initial_capital: 100000.0
  # 默认佣金费率
  commission_rate: 0.001
  # 是否启用滑点模拟
  slippage_enabled: false
  # 滑点比例
  slippage_rate: 0.0005

# 风险管理配置
risk_management:
  # 最大日亏损比例
  max_daily_loss: 0.05
  # 最大回撤比例
  max_drawdown: 0.15
  # 最大杠杆比例
  max_leverage: 1.0
  # 最大单票仓位比例
  max_position_size: 0.1
  # 最大行业暴露比例
  max_sector_exposure: 0.3

# 因子分析配置
factor:
  # IC置信水平
  ic_confidence_level: 0.95
  # 分层数量
  quantile_number: 5
  # 去极值比例
  winsorize_limits:
    lower: 0.025
    upper: 0.025
  # 默认标准化方法
  normalization_method: "standard"

# API配置
api:
  # akshare配置
  akshare:
    timeout: 30
    retry_times: 3

# 日志配置
logging:
  # 日志级别
  level: "INFO"
  # 日志文件路径
  log_dir: "./logs"
  # 保留天数
  backup_count: 30

# 环境配置
environment:
  # 是否为调试模式
  debug: false
  # 随机种子
  random_seed: 42